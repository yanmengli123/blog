<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仪表盘 - 鱼行尺素</title>
  
  <link rel="stylesheet" href="/public/css/font-awesome.min.css">
  <link rel="stylesheet" href="/public/css/inter/inter.css">
  <link rel="stylesheet" href="/public/css/admin.css">
  <script src="/public/js/echarts.min.js"></script>
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="sidebar">
      <div class="sidebar-logo"><span class="icon">📖</span><span>鱼行尺素</span></div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard" class="active"><i class="fas fa-home"></i>仪表盘</a>
        <a href="/admin/posts"><i class="fas fa-newspaper"></i>文章管理</a>
        <a href="/admin/friends"><i class="fas fa-link"></i>友链管理</a>
        <a href="/admin/comments"><i class="fas fa-comments"></i>评论管理</a>
        <a href="/admin/settings"><i class="fas fa-cog"></i>站点设置</a>
        <a href="/" target="_blank"><i class="fas fa-external-link-alt"></i>查看博客</a>
      </nav>
      <div class="sidebar-footer">
        <a href="/admin" onclick="logout()" style="display:flex;align-items:center;gap:8px;color:#64748b;text-decoration:none;font-size:14px;">
          <i class="fas fa-sign-out-alt"></i>退出登录
        </a>
      </div>
    </aside>

    <!-- Main -->
    <div class="admin-main">
      <header class="admin-header">
        <i class="fas fa-bars toggle-sidebar" onclick="toggleSidebar()"></i>
        <div class="user-info">
          <span id="welcomeMsg">欢迎回来，管理员</span>
          <a href="/" target="_blank" style="color:#8b5cf6;text-decoration:none;font-size:13px;"><i class="fas fa-external-link-alt"></i> 访问博客</a>
        </div>
      </header>

      <div class="admin-content">
        <div class="page-header">
          <div>
            <h1 class="page-title">仪表盘</h1>
            <p class="page-subtitle" id="siteUptime">博客数据总览</p>
          </div>
          <div style="font-size:12px;color:#64748b;" id="lastUpdated"></div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <div class="stat-icon purple"><i class="fas fa-newspaper"></i></div>
            <div>
              <div class="stat-value" id="statPosts">-</div>
              <div class="stat-label">文章总数</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon blue"><i class="fas fa-comment"></i></div>
            <div>
              <div class="stat-value" id="statComments">-</div>
              <div class="stat-label">评论总数</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green"><i class="fas fa-eye"></i></div>
            <div>
              <div class="stat-value" id="statViews">-</div>
              <div class="stat-label">总阅读量</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon orange"><i class="fas fa-users"></i></div>
            <div>
              <div class="stat-value" id="statFriends">-</div>
              <div class="stat-label">友链数量</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon teal"><i class="fas fa-globe"></i></div>
            <div>
              <div class="stat-value" id="statVisits">-</div>
              <div class="stat-label">总访问量</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon pink"><i class="fas fa-clock"></i></div>
            <div>
              <div class="stat-value" id="statToday">-</div>
              <div class="stat-label">今日访问</div>
            </div>
          </div>
        </div>

        <!-- Charts Row -->
        <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:20px;">
          <div class="card">
            <div class="card-header">
              <span class="card-title">📊 文章趋势（近12个月）</span>
            </div>
            <div id="chartPosts" style="height:260px;"></div>
          </div>
          <div class="card">
            <div class="card-header">
              <span class="card-title">📁 分类分布</span>
            </div>
            <div id="chartCategories" style="height:260px;"></div>
          </div>
        </div>

        <!-- Comments Chart + Recent -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">
          <div class="card">
            <div class="card-header">
              <span class="card-title">💬 评论趋势（近12个月）</span>
            </div>
            <div id="chartComments" style="height:220px;"></div>
          </div>
          <div class="card">
            <div class="card-header">
              <span class="card-title">📈 访问趋势（近30天）</span>
            </div>
            <div id="chartVisits" style="height:220px;"></div>
          </div>
        </div>

        <!-- Recent Posts & Comments -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">
          <div class="card">
            <div class="card-header">
              <span class="card-title">📝 最新文章</span>
              <a href="/admin/posts" class="btn btn-ghost btn-sm">查看全部</a>
            </div>
            <div id="recentPosts"><div class="loading">加载中...</div></div>
          </div>
          <div class="card">
            <div class="card-header">
              <span class="card-title">💬 最新评论</span>
              <a href="/admin/comments" class="btn btn-ghost btn-sm">查看全部</a>
            </div>
            <div id="recentComments"><div class="loading">加载中...</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/public/js/api.js"></script>
  <script>
    if (!AdminAPI.isLoggedIn()) window.location.href = '/admin';

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function logout() { AdminAPI.clearToken(); window.location.href = '/admin'; }

    let chartPosts, chartCategories, chartComments, chartVisits;

    function initCharts() {
      chartPosts = echarts.init(document.getElementById('chartPosts'));
      chartCategories = echarts.init(document.getElementById('chartCategories'));
      chartComments = echarts.init(document.getElementById('chartComments'));
      chartVisits = echarts.init(document.getElementById('chartVisits'));

      window.addEventListener('resize', () => {
        chartPosts.resize();
        chartCategories.resize();
        chartComments.resize();
        chartVisits.resize();
      });
    }

    function renderCharts(data) {
      const isDark = document.documentElement.classList.contains('dark');
      const textColor = isDark ? '#94a3b8' : '#64748b';
      const gridColor = isDark ? '#334155' : '#e2e8f0';

      // Posts trend
      const months = data.monthlyPosts.map(d => d.month);
      const postCounts = data.monthlyPosts.map(d => d.count);
      chartPosts.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger: 'axis', backgroundColor: isDark?'#1e293b':'#fff', borderColor: gridColor, textStyle: { color: isDark?'#f1f5f9':'#1e293b' } },
        grid: { left: '3%', right: '4%', bottom: '3%', top: '10%', containLabel: true },
        xAxis: { type: 'category', data: months, axisLine: { lineStyle: { color: gridColor } }, axisLabel: { color: textColor, fontSize: 11 }, axisTick: { show: false } },
        yAxis: { type: 'value', axisLine: { show: false }, axisLabel: { color: textColor, fontSize: 11 }, splitLine: { lineStyle: { color: gridColor } } },
        series: [{ data: postCounts, type: 'bar', barWidth: '50%', itemStyle: { color: '#8b5cf6', borderRadius: [4,4,0,0] }, label: { show: true, color: textColor, fontSize: 10 } }]
      });

      // Category pie
      const catData = data.categories.filter(c => c.count > 0);
      chartCategories.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger: 'item', backgroundColor: isDark?'#1e293b':'#fff', borderColor: gridColor, textStyle: { color: isDark?'#f1f5f9':'#1e293b' } },
        legend: { bottom: 0, textStyle: { color: textColor, fontSize: 11 }, itemWidth: 12 },
        series: [{ type: 'pie', radius: ['40%', '70%'], center: ['50%','45%'], data: catData.map(c => ({ name: c.name, value: c.count })), itemStyle: { borderRadius: 6, borderColor: isDark?'#1e293b':'#fff', borderWidth: 2 }, label: { color: textColor, fontSize: 11 } }]
      });

      // Comments trend
      const cMonths = data.monthlyComments.map(d => d.month);
      const commentCounts = data.monthlyComments.map(d => d.count);
      chartComments.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger: 'axis', backgroundColor: isDark?'#1e293b':'#fff', borderColor: gridColor, textStyle: { color: isDark?'#f1f5f9':'#1e293b' } },
        grid: { left: '3%', right: '4%', bottom: '3%', top: '10%', containLabel: true },
        xAxis: { type: 'category', data: cMonths, axisLine: { lineStyle: { color: gridColor } }, axisLabel: { color: textColor, fontSize: 11 }, axisTick: { show: false } },
        yAxis: { type: 'value', axisLine: { show: false }, axisLabel: { color: textColor, fontSize: 11 }, splitLine: { lineStyle: { color: gridColor } } },
        series: [{ data: commentCounts, type: 'line', smooth: true, lineStyle: { color: '#f59e0b', width: 2 }, areaStyle: { color: { type: 'linear', x:0,y:0,x2:0,y2:1, colorStops: [{offset:0,color:'rgba(245,158,11,0.2)'},{offset:1,color:'rgba(245,158,11,0)'}] } }, itemStyle: { color: '#f59e0b' }, symbol: 'circle', symbolSize: 5 }]
      });

      // Visits trend
      const vDays = data.dailyVisits.map(d => d.day);
      const vCounts = data.dailyVisits.map(d => d.count);
      chartVisits.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger: 'axis', backgroundColor: isDark?'#1e293b':'#fff', borderColor: gridColor, textStyle: { color: isDark?'#f1f5f9':'#1e293b' } },
        grid: { left: '3%', right: '4%', bottom: '3%', top: '10%', containLabel: true },
        xAxis: { type: 'category', data: vDays, axisLine: { lineStyle: { color: gridColor } }, axisLabel: { color: textColor, fontSize: 10, rotate: 30 }, axisTick: { show: false } },
        yAxis: { type: 'value', axisLine: { show: false }, axisLabel: { color: textColor, fontSize: 11 }, splitLine: { lineStyle: { color: gridColor } } },
        series: [{ data: vCounts, type: 'line', smooth: true, lineStyle: { color: '#10b981', width: 2 }, areaStyle: { color: { type: 'linear', x:0,y:0,x2:0,y2:1, colorStops: [{offset:0,color:'rgba(16,185,129,0.2)'},{offset:1,color:'rgba(16,185,129,0)'}] } }, itemStyle: { color: '#10b981' }, symbol: 'circle', symbolSize: 4 }]
      });
    }

    async function loadDashboard() {
      try {
        const [statsData, profileData] = await Promise.all([
          AdminAPI.getStats(),
          AdminAPI.getProfile(),
        ]);

        // Stats
        const s = statsData.stats;
        document.getElementById('statPosts').textContent = s.totalPosts;
        document.getElementById('statComments').textContent = s.totalComments;
        document.getElementById('statViews').textContent = formatNumber(s.totalViews);
        document.getElementById('statFriends').textContent = s.totalFriends;
        document.getElementById('statVisits').textContent = formatNumber(s.totalVisits);
        document.getElementById('statToday').textContent = s.todayVisits;

        // Uptime
        if (profileData) {
          document.getElementById('welcomeMsg').textContent = `欢迎回来，${profileData.nickname || '管理员'}`;
        }
        if (s.blogCreatedAt) {
          const start = new Date(s.blogCreatedAt);
          const now = new Date();
          const days = Math.floor((now - start) / 86400000);
          document.getElementById('siteUptime').textContent = `博客已运行 ${days} 天`;
        }

        // Last updated
        document.getElementById('lastUpdated').textContent = `更新时间: ${new Date().toLocaleTimeString('zh-CN')}`;

        // Charts data
        const chartsData = await API.request('GET', '/stats/charts');
        renderCharts(chartsData);

        // Recent posts
        const postsEl = document.getElementById('recentPosts');
        if (statsData.recentPosts.length === 0) {
          postsEl.innerHTML = '<div style="padding:20px;text-align:center;color:#64748b;font-size:14px;">暂无文章</div>';
        } else {
          postsEl.innerHTML = '<table style="width:100%;border-collapse:collapse;font-size:13px;">' +
            '<thead><tr style="border-bottom:1px solid #334155;"><th style="padding:10px 16px;text-align:left;color:#64748b;font-weight:500;">标题</th><th style="padding:10px 16px;text-align:left;color:#64748b;font-weight:500;">分类</th><th style="padding:10px 16px;text-align:right;color:#64748b;font-weight:500;">阅读</th></tr></thead><tbody>' +
            statsData.recentPosts.map(p => `<tr style="border-bottom:1px solid rgba(51,65,85,0.5);">
              <td style="padding:12px 16px;color:#f1f5f9;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.title}</td>
              <td style="padding:12px 16px;"><span class="badge badge-purple">${p.category_name || '未分类'}</span></td>
              <td style="padding:12px 16px;text-align:right;color:#64748b;">${p.view_count || 0}</td>
            </tr>`).join('') + '</tbody></table>';
        }

        // Recent comments
        const commentsEl = document.getElementById('recentComments');
        if (statsData.recentComments.length === 0) {
          commentsEl.innerHTML = '<div style="padding:20px;text-align:center;color:#64748b;font-size:14px;">暂无评论</div>';
        } else {
          commentsEl.innerHTML = statsData.recentComments.map(c => `
            <div style="padding:14px 16px;border-bottom:1px solid rgba(51,65,85,0.5);">
              <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                <span style="font-size:13px;font-weight:600;color:#f1f5f9;">${c.nickname}</span>
                <span style="font-size:12px;color:#64748b;">${formatDate(c.created_at)}</span>
              </div>
              <div style="font-size:13px;color:#94a3b8;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.content}</div>
              <div style="font-size:12px;color:#64748b;">文章: ${c.post_title || '(已删除)'}</div>
            </div>`).join('');
        }

        initCharts();
      } catch (err) {
        console.error('[loadDashboard]', err);
        document.getElementById('recentPosts').innerHTML = '<div style="padding:20px;color:#f87171;font-size:13px;">数据加载失败: ' + err.message + '</div>';
        document.getElementById('recentComments').innerHTML = '<div style="padding:20px;color:#f87171;font-size:13px;">数据加载失败: ' + err.message + '</div>';
      }
    }

    loadDashboard();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章管理 - 鱼行尺素</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/public/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="sidebar">
      <div class="sidebar-logo"><span class="icon">📖</span><span>鱼行尺素</span></div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard"><i class="fas fa-home"></i>仪表盘</a>
        <a href="/admin/posts" class="active"><i class="fas fa-newspaper"></i>文章管理</a>
        <a href="/admin/friends"><i class="fas fa-link"></i>友链管理</a>
        <a href="/admin/comments"><i class="fas fa-comments"></i>评论管理</a>
        <a href="/admin/settings"><i class="fas fa-cog"></i>站点设置</a>
        <a href="/" target="_blank"><i class="fas fa-external-link-alt"></i>查看博客</a>
      </nav>
      <div class="sidebar-footer">
        <a href="/admin" onclick="AdminAPI.clearToken()" style="display:flex;align-items:center;gap:8px;color:#64748b;text-decoration:none;font-size:14px;">
          <i class="fas fa-sign-out-alt"></i>退出登录
        </a>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-header">
        <i class="fas fa-bars toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('collapsed')"></i>
        <div class="user-info"><a href="/" target="_blank" style="color:#8b5cf6;text-decoration:none;">查看博客 →</a></div>
      </header>
      <div class="admin-content">
        <div class="page-header">
          <div>
            <h1 class="page-title">文章管理</h1>
            <p class="page-subtitle">共 <span id="totalCount">-</span> 篇文章</p>
          </div>
          <a href="/admin/posts/new" class="btn btn-primary"><i class="fas fa-plus"></i>写文章</a>
        </div>

        <!-- Filters -->
        <div style="display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap;">
          <input type="text" id="searchInput" placeholder="搜索文章标题..."
                 style="flex:1;min-width:200px;padding:9px 14px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#f1f5f9;font-size:14px;outline:none;"
                 onkeydown="if(event.key==='Enter')loadPosts()">
          <button class="btn btn-primary" onclick="loadPosts()"><i class="fas fa-search"></i>搜索</button>
          <button class="btn btn-ghost" onclick="document.getElementById('searchInput').value='';currentSearch='';loadPosts()">重置</button>
        </div>

        <!-- Table -->
        <div class="data-table">
          <table>
            <thead>
              <tr>
                <th>标题</th>
                <th>分类</th>
                <th>标签</th>
                <th>阅读</th>
                <th>状态</th>
                <th>置顶</th>
                <th>时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="postsTable">
              <tr><td colspan="8"><div class="loading">加载中...</div></td></tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">⚠️ 确认删除</span>
        <span class="modal-close" onclick="closeModal('deleteModal')">×</span>
      </div>
      <div class="modal-body">
        <p style="color:#94a3b8;font-size:14px;">确定要删除文章 <strong id="deletePostTitle" style="color:#f1f5f9;"></strong> 吗？此操作不可恢复。</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('deleteModal')">取消</button>
        <button class="btn btn-danger" id="confirmDeleteBtn"><i class="fas fa-trash"></i>确认删除</button>
      </div>
    </div>
  </div>

  <script src="/public/js/api.js"></script>
  <script>
    if (!AdminAPI.isLoggedIn()) window.location.href = '/admin';
    let currentPage = 1;
    let totalItems = 0;
    const pageSize = 15;
    let currentSearch = '';

    async function loadPosts(page = 1) {
      currentPage = page;
      const search = document.getElementById('searchInput').value;
      if (search !== currentSearch) { currentPage = 1; currentSearch = search; }
      try {
        // Get total count
        const countData = await AdminAPI.getPostCount({ search: currentSearch || undefined });
        totalItems = countData.total || 0;
        document.getElementById('totalCount').textContent = totalItems;

        const posts = await AdminAPI.getPosts({ page: currentPage, limit: pageSize, search: currentSearch || undefined });
        const tbody = document.getElementById('postsTable');

        if (posts.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:#64748b;">暂无文章</td></tr>';
          document.getElementById('pagination').innerHTML = '';
          return;
        }

        tbody.innerHTML = posts.map(p => `
          <tr>
            <td><a href="/admin/posts/edit/${p.id}" style="color:#a78bfa;text-decoration:none;font-weight:500;">${p.title}</a></td>
            <td><span class="badge badge-purple">${p.category_name || '未分类'}</span></td>
            <td style="font-size:12px;color:#64748b;">${(p.tags||[]).slice(0,2).map(t=>`<span style="background:rgba(139,92,246,0.1);color:#a78bfa;padding:1px 6px;border-radius:10px;margin-right:3px;">${t}</span>`).join('')}</td>
            <td>${p.view_count || 0}</td>
            <td><span class="badge ${p.is_published?'badge-green':'badge-red'}">${p.is_published?'已发布':'草稿'}</span></td>
            <td>${p.is_pinned?'<span class="badge badge-orange">置顶</span>':'<span style="color:#64748b;font-size:12px;">-</span>'}</td>
            <td style="font-size:12px;color:#64748b;">${formatDate(p.created_at)}</td>
            <td>
              <div style="display:flex;gap:4px;">
                <a href="/admin/posts/edit/${p.id}" class="btn btn-ghost btn-sm btn-icon" title="编辑"><i class="fas fa-edit"></i></a>
                <a href="/post/${p.slug}" target="_blank" class="btn btn-ghost btn-sm btn-icon" title="查看"><i class="fas fa-external-link-alt"></i></a>
                <button class="btn btn-danger btn-sm btn-icon" onclick="confirmDelete(${p.id},'${(p.title||'').replace(/'/g,"\\'")}')" title="删除"><i class="fas fa-trash"></i></button>
              </div>
            </td>
          </tr>`).join('');

        // Pagination
        renderPagination();
      } catch(e) { console.error(e); }
    }

    function renderPagination() {
      const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
      const pg = document.getElementById('pagination');
      if (totalPages <= 1) { pg.innerHTML = ''; return; }

      let html = `<button onclick="loadPosts(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''} class="pg-btn"><i class="fas fa-chevron-left"></i></button>`;

      const range = getPaginationRange(currentPage, totalPages);
      range.forEach(p => {
        if (p === '...') {
          html += `<span style="padding:0 8px;color:#64748b;">…</span>`;
        } else {
          html += `<button onclick="loadPosts(${p})" class="pg-btn ${p === currentPage ? 'active' : ''}">${p}</button>`;
        }
      });

      html += `<button onclick="loadPosts(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''} class="pg-btn"><i class="fas fa-chevron-right"></i></button>`;
      pg.innerHTML = html;
    }

    function getPaginationRange(current, total) {
      if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
      const pages = [];
      if (current <= 4) {
        pages.push(1, 2, 3, 4, 5, '...', total);
      } else if (current >= total - 3) {
        pages.push(1, '...', total - 4, total - 3, total - 2, total - 1, total);
      } else {
        pages.push(1, '...', current - 1, current, current + 1, '...', total);
      }
      return pages;
    }

    function confirmDelete(id, title) {
      document.getElementById('deletePostTitle').textContent = title;
      document.getElementById('deleteModal').classList.add('show');
      document.getElementById('confirmDeleteBtn').onclick = async () => {
        try {
          await AdminAPI.deletePost(id);
          closeModal('deleteModal');
          showToast('删除成功');
          loadPosts(currentPage);
        } catch(e) { showToast(e.message, 'error'); }
      };
    }

    function closeModal(id) { document.getElementById(id).classList.remove('show'); }

    loadPosts();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 鱼行尺素</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="icon">📖</div>
        <h1>鱼行尺素</h1>
        <p>博客管理后台</p>
      </div>
      <div id="loginError" class="login-error">用户名或密码错误</div>
      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="username" placeholder="请输入用户名" required autofocus>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">
          <i class="fas fa-sign-in-alt"></i> 登录
        </button>
      </form>
      <div style="text-align:center;margin-top:20px;font-size:12px;color:#64748b;">
        <a href="/" style="color:#8b5cf6;text-decoration:none;">← 返回博客首页</a>
      </div>
    </div>
  </div>
  <script>
    if (AdminAPI.isLoggedIn()) window.location.href = '/admin/dashboard';
    async function handleLogin(e) {
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      try {
        const r = await AdminAPI.login(u, p);
        AdminAPI.setToken(r.token);
        window.location.href = '/admin/dashboard';
      } catch (err) {
        document.getElementById('loginError').style.display = 'block';
      }
    }
  </script>
  <script src="/js/api.js"></script>
</body>
</html>

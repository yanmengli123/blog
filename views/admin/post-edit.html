<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">写文章 - 鱼行尺素</title>
  <link href="<link rel="stylesheet" href="/public/css/inter.css">" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/font-awesome.min.css">
  <link rel="stylesheet" href="/public/css/admin.css">
  <style>
    .editor-wrap { display: grid; grid-template-columns: 1fr 280px; gap: 20px; }
    .editor-main textarea {
      width: 100%; min-height: 500px; padding: 16px;
      border: 1px solid #334155; border-radius: 10px;
      background: #0f172a; color: #f1f5f9; font-size: 14px;
      font-family: 'JetBrains Mono', monospace; resize: vertical; outline: none;
      transition: border-color 0.2s;
    }
    .editor-main textarea:focus { border-color: #8b5cf6; }
    .editor-sidebar .form-group { margin-bottom: 16px; }
    .editor-sidebar label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .editor-sidebar input, .editor-sidebar select {
      width: 100%; padding: 9px 12px; border-radius: 8px;
      border: 1px solid #334155; background: #0f172a; color: #f1f5f9;
      font-size: 13px; outline: none;
    }
    .editor-sidebar input:focus, .editor-sidebar select:focus { border-color: #8b5cf6; }
    .editor-sidebar textarea {
      width: 100%; padding: 9px 12px; border-radius: 8px;
      border: 1px solid #334155; background: #0f172a; color: #f1f5f9;
      font-size: 13px; resize: none; height: 80px; outline: none;
    }
    .tag-box { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .tag-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 20px;
      background: rgba(139,92,246,0.15); color: #a78bfa; font-size: 11px; cursor: pointer;
    }
    .tag-chip:hover, .tag-chip.selected { background: #8b5cf6; color: #fff; }
    .cover-preview { width: 100%; height: 100px; border-radius: 8px; border: 1px dashed #334155; object-fit: cover; display: none; }
    .top-bar { display: flex; gap: 8px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="sidebar">
      <div class="sidebar-logo"><span class="icon">📖</span><span>鱼行尺素</span></div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard"><i class="fas fa-home"></i>仪表盘</a>
        <a href="/admin/posts" class="active"><i class="fas fa-newspaper"></i>文章管理</a>
        <a href="/admin/friends"><i class="fas fa-link"></i>友链管理</a>
        <a href="/admin/comments"><i class="fas fa-comments"></i>评论管理</a>
        <a href="/admin/settings"><i class="fas fa-cog"></i>站点设置</a>
        <a href="/" target="_blank"><i class="fas fa-external-link-alt"></i>查看博客</a>
      </nav>
      <div class="sidebar-footer">
        <a href="/admin" onclick="AdminAPI.clearToken()" style="display:flex;align-items:center;gap:8px;color:#64748b;text-decoration:none;font-size:14px;"><i class="fas fa-sign-out-alt"></i>退出登录</a>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-header">
        <i class="fas fa-bars toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('collapsed')"></i>
        <div class="user-info">
          <a href="/admin/posts" class="btn btn-ghost btn-sm"><i class="fas fa-arrow-left"></i> 返回列表</a>
        </div>
      </header>

      <div class="admin-content">
        <div class="top-bar">
          <button class="btn btn-primary" onclick="savePost(true)"><i class="fas fa-check"></i> 发布文章</button>
          <button class="btn btn-ghost" onclick="savePost(false)"><i class="fas fa-save"></i> 保存草稿</button>
        </div>

        <div class="editor-wrap">
          <!-- Main editor -->
          <div class="editor-main">
            <div style="margin-bottom:12px;">
              <input type="text" id="postTitle" placeholder="输入文章标题..." maxlength="200"
                     style="width:100%;padding:12px 16px;border:1px solid #334155;border-radius:10px;background:#1e293b;color:#f1f5f9;font-size:18px;font-weight:600;outline:none;">
            </div>
            <textarea id="postContent" placeholder="使用 Markdown 编写文章内容..."></textarea>
          </div>

          <!-- Sidebar -->
          <div class="editor-sidebar">
            <div class="form-group">
              <label>分类</label>
              <select id="postCategory"><option value="">请选择分类</option></select>
            </div>
            <div class="form-group">
              <label>标签</label>
              <div id="tagList" class="tag-box"><div class="loading" style="font-size:12px;">加载中...</div></div>
            </div>
            <div class="form-group">
              <label>封面图片 URL</label>
              <input type="url" id="postCover" placeholder="https://..." oninput="previewCover(this.value)">
              <img id="coverPreview" class="cover-preview" alt="封面预览">
            </div>
            <div class="form-group">
              <label>摘要（可选）</label>
              <textarea id="postExcerpt" placeholder="自动取正文前200字符，如需自定义请填写..."></textarea>
            </div>
            <div class="form-group">
              <label>置顶</label>
              <div style="display:flex;align-items:center;gap:10px;">
                <label class="switch"><input type="checkbox" id="postPinned"><span class="switch-slider"></span></label>
                <span style="font-size:13px;color:#94a3b8;">是否置顶</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (!AdminAPI.isLoggedIn()) window.location.href = '/admin';

    const isEdit = parseInt(new URLSearchParams(location.search).get('id') || 0) > 0;
    let selectedTags = [];
    let allTags = [];
    let editId = null;

    async function init() {
      const [cats, tags] = await Promise.all([AdminAPI.getCategories(), AdminAPI.getTags()]);
      allTags = tags;

      // Render categories
      document.getElementById('postCategory').innerHTML = '<option value="">请选择分类</option>' +
        cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

      // Render tags
      document.getElementById('tagList').innerHTML = tags.map(t =>
        `<span class="tag-chip" data-id="${t.id}" onclick="toggleTag(${t.id})">${t.name}</span>`
      ).join('');

      if (isEdit) {
        editId = parseInt(location.pathname.split('/').pop());
        document.getElementById('pageTitle').textContent = '编辑文章 - 鱼行尺素';
        const post = await AdminAPI.getPost(editId);
        document.getElementById('postTitle').value = post.title;
        document.getElementById('postContent').value = post.content;
        document.getElementById('postCategory').value = post.category_id || '';
        document.getElementById('postCover').value = post.cover_image || '';
        document.getElementById('postExcerpt').value = post.excerpt || '';
        document.getElementById('postPinned').checked = !!post.is_pinned;
        selectedTags = post.tag_ids || [];
        selectedTags.forEach(id => {
          const el = document.querySelector(`.tag-chip[data-id="${id}"]`);
          if (el) el.classList.add('selected');
        });
        if (post.cover_image) previewCover(post.cover_image);
      }
    }

    function toggleTag(id) {
      const el = document.querySelector(`.tag-chip[data-id="${id}"]`);
      if (selectedTags.includes(id)) {
        selectedTags = selectedTags.filter(t => t !== id);
        el.classList.remove('selected');
      } else {
        selectedTags.push(id);
        el.classList.add('selected');
      }
    }

    function previewCover(url) {
      const img = document.getElementById('coverPreview');
      if (url) { img.src = url; img.style.display = 'block'; }
      else { img.style.display = 'none'; }
    }

    async function savePost(published) {
      const title = document.getElementById('postTitle').value.trim();
      const content = document.getElementById('postContent').value.trim();
      if (!title) { showToast('请填写文章标题', 'error'); return; }
      if (!content) { showToast('请填写文章内容', 'error'); return; }

      const data = {
        title,
        content,
        excerpt: document.getElementById('postExcerpt').value.trim(),
        cover_image: document.getElementById('postCover').value.trim() || null,
        category_id: parseInt(document.getElementById('postCategory').value) || null,
        is_pinned: document.getElementById('postPinned').checked,
        is_published: published,
        tags: selectedTags,
      };

      try {
        if (isEdit) {
          await AdminAPI.updatePost(editId, data);
          showToast('更新成功');
        } else {
          const r = await AdminAPI.createPost(data);
          showToast('发布成功');
          if (!published) history.replaceState({}, '', `/admin/posts/edit/${r.id}`);
          editId = r.id;
          document.getElementById('pageTitle').textContent = '编辑文章 - 鱼行尺素';
        }
      } catch(e) { showToast(e.message, 'error'); }
    }

    init();
  </script>
</body>
</html>

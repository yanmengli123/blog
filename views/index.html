  <script>
(function() {
    'use strict';

    /* ========== Error boundary ========== */
    window.addEventListener('error', function(e) {
        console.error('[Page Error]', e.error);
    });

    /* ========== Article Overview Chart ========== */
    var articleOverviewChart = null;
    var chartsData = null;
    var currentArticleChartTab = 'posts';

    function initArticleOverviewChart() {
        var el = document.getElementById('article-overview-chart');
        if (!el || typeof echarts === 'undefined') return;
        articleOverviewChart = echarts.init(el);
        window.addEventListener('resize', function() {
            if (articleOverviewChart) articleOverviewChart.resize();
        });
        var obs = new MutationObserver(function() {
            if (chartsData) renderArticleChart(currentArticleChartTab);
        });
        obs.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
    }

    function loadChartData() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/stats/charts', true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try {
                        chartsData = JSON.parse(xhr.responseText);
                        renderArticleChart('posts');
                    } catch(e) { console.error('Charts parse error', e); }
                }
            }
        };
        xhr.send();
    }

    function switchArticleChart(tab) {
        currentArticleChartTab = tab;
        ['posts','categories','visits'].forEach(function(t) {
            var btn = document.getElementById('chart-tab-' + t);
            if (!btn) return;
            if (t === tab) {
                btn.className = 'flex-1 px-2 py-1.5 rounded-lg text-xs font-medium bg-purple-100 dark:bg-purple-900/40 text-purple-600 dark:text-purple-300 transition-all';
            } else {
                btn.className = 'flex-1 px-2 py-1.5 rounded-lg text-xs font-medium bg-gray-100 dark:bg-slate-700 text-gray-500 dark:text-gray-400 transition-all';
            }
        });
        renderArticleChart(tab);
    }

    function renderArticleChart(tab) {
        if (!articleOverviewChart || !chartsData) return;
        var isDark = document.documentElement.classList.contains('dark');
        var textColor = isDark ? '#94a3b8' : '#64748b';
        var gridColor = isDark ? '#334155' : '#e2e8f0';
        var tooltipBg = isDark ? '#1e293b' : '#ffffff';
        var tooltipBorder = gridColor;

        if (tab === 'posts') {
            var months = chartsData.monthlyPosts.map(function(d){ return d.month.replace(/^\d+-/, ''); });
            var counts = chartsData.monthlyPosts.map(function(d){ return d.count; });
            articleOverviewChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis', backgroundColor: tooltipBg, borderColor: tooltipBorder, textStyle: { color: isDark?'#f1f5f9':'#1e293b' } },
                grid: { left: '3%', right: '4%', bottom: '8%', top: '8%', containLabel: true },
                xAxis: { type: 'category', data: months, axisLine: { lineStyle: { color: gridColor } }, axisLabel: { color: textColor, fontSize: 10 }, axisTick: { show: false } },
                yAxis: { type: 'value', axisLine: { show: false }, axisLabel: { color: textColor, fontSize: 10 }, splitLine: { lineStyle: { color: gridColor } } },
                series: [{ data: counts, type: 'bar', barWidth: '50%', itemStyle: { color: '#8b5cf6', borderRadius: [3,3,0,0] } }]
            }, true);
        } else if (tab === 'categories') {
            var catData = chartsData.categories.filter(function(c){ return c.count > 0; });
            articleOverviewChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'item', backgroundColor: tooltipBg, borderColor: tooltipBorder, textStyle: { color: isDark?'#f1f5f9':'#1e293b' } },
                legend: { bottom: 0, textStyle: { color: textColor, fontSize: 10 }, itemWidth: 10 },
                series: [{ type: 'pie', radius: ['35%','65%'], center: ['50%','45%'], data: catData.map(function(c){ return { name: c.name, value: c.count }; }), itemStyle: { borderRadius: 4, borderColor: isDark?'#1e293b':'#ffffff', borderWidth: 2 }, label: { color: textColor, fontSize: 10 } }]
            }, true);
        } else if (tab === 'visits') {
            var days = chartsData.dailyVisits.map(function(d){ return d.day.slice(5); });
            var vCounts = chartsData.dailyVisits.map(function(d){ return d.count; });
            articleOverviewChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis', backgroundColor: tooltipBg, borderColor: tooltipBorder, textStyle: { color: isDark?'#f1f5f9':'#1e293b' } },
                grid: { left: '3%', right: '4%', bottom: '8%', top: '8%', containLabel: true },
                xAxis: { type: 'category', data: days, axisLine: { lineStyle: { color: gridColor } }, axisLabel: { color: textColor, fontSize: 10, rotate: 30 }, axisTick: { show: false } },
                yAxis: { type: 'value', axisLine: { show: false }, axisLabel: { color: textColor, fontSize: 10 }, splitLine: { lineStyle: { color: gridColor } } },
                series: [{ data: vCounts, type: 'line', smooth: true, lineStyle: { color: '#10b981', width: 2 }, areaStyle: { color: { type: 'linear', x:0,y:0,x2:0,y2:1, colorStops: [{offset:0,color:'rgba(16,185,129,0.2)'},{offset:1,color:'rgba(16,185,129,0)'}] } }, itemStyle: { color: '#10b981' }, symbol: 'none' }]
            }, true);
        }
    }

    /* ========== Calendar Widget ========== */
    function renderCalendar(postDays) {
        var now = new Date();
        var year = now.getFullYear();
        var month = now.getMonth();
        var el = document.getElementById('calendar-month-title');
        if (el) el.textContent = year + '\u5e74' + (month + 1) + '\u6708';
        var footerYear = document.getElementById('footer-year');
        if (footerYear) footerYear.textContent = year;

        var firstDay = new Date(year, month, 1).getDay();
        var daysInMonth = new Date(year, month + 1, 0).getDate();
        var today = now.getDate();
        var weekDays = ['\u65e5','\u4e00','\u4e8c','\u4e09','\u56db','\u4e94','\u516d'];
        var postSet = {};
        postDays.forEach(function(d){ postSet[d] = true; });

        var html = '<div class="grid grid-cols-7 gap-1 mb-1">';
        weekDays.forEach(function(d){ html += '<div class="text-center text-xs font-medium py-1 text-gray-400 dark:text-gray-500">' + d + '</div>'; });
        html += '</div><div class="grid grid-cols-7 gap-1">';
        for (var i = 0; i < firstDay; i++) { html += '<div></div>'; }
        for (var d = 1; d <= daysInMonth; d++) {
            var hasPost = postSet[d];
            var isToday = d === today;
            html += '<div class="aspect-square flex items-center justify-center rounded-lg text-xs relative cursor-default' + (isToday ? ' font-bold' : '') + '">';
            html += '<span class="' + (isToday ? 'w-7 h-7 flex items-center justify-center rounded-full bg-purple-500 text-white' : 'text-gray-600 dark:text-gray-300') + '">' + d + '</span>';
            if (hasPost && !isToday) html += '<span class="absolute bottom-0.5 w-1 h-1 rounded-full bg-purple-400"></span>';
            html += '</div>';
        }
        html += '</div>';
        var calEl = document.getElementById('calendar-widget');
        if (calEl) calEl.innerHTML = html;
    }

    /* ========== HTML Escape ========== */
    function esc(s) {
        if (s == null) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ========== Main Init ========== */
    function initIndex() {
        var profileXhr = new XMLHttpRequest();
        var settingsXhr = new XMLHttpRequest();
        var statsXhr = new XMLHttpRequest();
        var tagsXhr = new XMLHttpRequest();
        var postsAllXhr = new XMLHttpRequest();

        function whenAll(cb) {
            var count = [profileXhr, settingsXhr, statsXhr, tagsXhr, postsAllXhr].filter(function(x){ return x.readyState < 4; }).length;
            var timer = setInterval(function() {
                var remaining = [profileXhr, settingsXhr, statsXhr, tagsXhr, postsAllXhr].filter(function(x){ return x.readyState < 4; }).length;
                if (remaining === 0) {
                    clearInterval(timer);
                    try { cb(); } catch(e) { console.error('[initIndex]', e); }
                }
            }, 50);
        }

        var done = { profile: false, settings: false, stats: false, tags: false, postsAll: false };
        var data = {};

        function checkDone() {
            var allDone = done.profile && done.settings && done.stats && done.tags && done.postsAll;
            if (allDone) {
                try { bootstrap(data); } catch(e) { console.error('[bootstrap]', e); }
            }
        }

        profileXhr.open('GET', '/api/profile', true);
        profileXhr.onreadystatechange = function() {
            if (profileXhr.readyState === 4 && profileXhr.status === 200) {
                try { data.profile = JSON.parse(profileXhr.responseText); } catch(e){}
                done.profile = true; checkDone();
            } else if (profileXhr.readyState === 4) { done.profile = true; checkDone(); }
        };

        settingsXhr.open('GET', '/api/settings', true);
        settingsXhr.onreadystatechange = function() {
            if (settingsXhr.readyState === 4 && settingsXhr.status === 200) {
                try { data.settings = JSON.parse(settingsXhr.responseText); } catch(e){}
                done.settings = true; checkDone();
            } else if (settingsXhr.readyState === 4) { done.settings = true; checkDone(); }
        };

        statsXhr.open('GET', '/api/stats', true);
        statsXhr.onreadystatechange = function() {
            if (statsXhr.readyState === 4 && statsXhr.status === 200) {
                try { data.stats = JSON.parse(statsXhr.responseText); } catch(e){}
                done.stats = true; checkDone();
            } else if (statsXhr.readyState === 4) { done.stats = true; checkDone(); }
        };

        tagsXhr.open('GET', '/api/tags', true);
        tagsXhr.onreadystatechange = function() {
            if (tagsXhr.readyState === 4 && tagsXhr.status === 200) {
                try { data.tags = JSON.parse(tagsXhr.responseText); } catch(e){}
                done.tags = true; checkDone();
            } else if (tagsXhr.readyState === 4) { done.tags = true; checkDone(); }
        };

        postsAllXhr.open('GET', '/api/posts/all', true);
        postsAllXhr.onreadystatechange = function() {
            if (postsAllXhr.readyState === 4 && postsAllXhr.status === 200) {
                try { data.postsAll = JSON.parse(postsAllXhr.responseText); } catch(e){}
                done.postsAll = true; checkDone();
            } else if (postsAllXhr.readyState === 4) { done.postsAll = true; checkDone(); }
        };

        profileXhr.send();
        settingsXhr.send();
        statsXhr.send();
        tagsXhr.send();
        postsAllXhr.send();
    }

    function bootstrap(data) {
        var profile = data.profile;
        var settings = data.settings;
        var stats = data.stats;
        var tags = data.tags || [];
        var postsAll = data.postsAll || [];

        // Profile
        if (profile) {
            var navName = document.getElementById('nav-site-name');
            if (navName) navName.textContent = profile.nickname || '\u9c5f\u884c\u5c3a\u7d20';
            var pageTitle = document.getElementById('page-title');
            if (pageTitle) pageTitle.textContent = (profile.nickname || '\u9c5f\u884c\u5c3a\u7d20') + ' - ' + (profile.signature || '');
            var metaDesc = document.getElementById('meta-desc');
            if (metaDesc) metaDesc.content = profile.bio || settings.site_description || '';
            var siteNotice = document.getElementById('site-notice');
            if (siteNotice) siteNotice.textContent = profile.bio || '\u6b22\u8fce\u6765\u5230' + (profile.nickname || '\u9c5f\u884c\u5c3a\u7d20') + '\u7684\u535a\u5ba2';
            var githubLink = document.getElementById('github-link');
            if (githubLink && profile.github_url) githubLink.href = profile.github_url;
            var bilibiliLink = document.getElementById('bilibili-link');
            if (bilibiliLink && profile.social_links && profile.social_links.bilibili) bilibiliLink.href = profile.social_links.bilibili;
            var asideNick = document.getElementById('aside-nickname');
            if (asideNick && profile.nickname) asideNick.textContent = profile.nickname;
            var asideAvatar = document.getElementById('aside-avatar');
            if (asideAvatar && profile.nickname) asideAvatar.textContent = profile.nickname[0];
            var asideSig = document.getElementById('aside-signature');
            if (asideSig && profile.signature) asideSig.textContent = profile.signature;
        }

        // Tags
        var tagCloudEl = document.getElementById('tag-cloud');
        if (tagCloudEl && tags.length > 0) {
            if (typeof initTagCloud === 'function') {
                initTagCloud('tag-cloud', tags.map(function(t){ return { name: t.name, count: t.post_count }; }));
            } else {
                tagCloudEl.innerHTML = tags.map(function(t){
                    return '<span class="inline-block px-3 py-1 rounded-full text-sm font-medium cursor-pointer" style="background:rgba(139,92,246,0.08);color:#8b5cf6;">' + esc(t.name) + ' <span class="opacity-50 text-xs">' + (t.post_count||0) + '</span></span>';
                }).join('');
            }
        }

        // Stats
        if (stats) {
            var el = document.getElementById('stat-total-visits');
            if (el) el.textContent = typeof formatNumber === 'function' ? formatNumber(stats.totalVisits) : stats.totalVisits;
            el = document.getElementById('stat-today-visits');
            if (el) el.textContent = stats.todayVisits;
            el = document.getElementById('stat-total-views');
            if (el) el.textContent = typeof formatNumber === 'function' ? formatNumber(stats.totalViews) : stats.totalViews;
            el = document.getElementById('aside-posts');
            if (el) el.textContent = stats.totalPosts;
            el = document.getElementById('aside-tags');
            if (el) el.textContent = tags.length;
            el = document.getElementById('aside-comments');
            if (el) el.textContent = stats.totalComments;
            var uptimeEl = document.getElementById('stat-uptime');
            if (uptimeEl) {
                if (stats.blogCreatedAt) {
                    var start = new Date(stats.blogCreatedAt);
                    var now = new Date();
                    var days = Math.floor((now - start) / 86400000);
                    uptimeEl.textContent = days + ' \u5929';
                } else {
                    uptimeEl.textContent = '-';
                }
            }

            // Auto-refresh stats every 30s
            setInterval(function() {
                var r = new XMLHttpRequest();
                r.open('GET', '/api/stats', true);
                r.onreadystatechange = function() {
                    if (r.readyState === 4 && r.status === 200) {
                        try {
                            var s = JSON.parse(r.responseText);
                            var update = function(id, val) { var el2 = document.getElementById(id); if (el2) el2.textContent = val; };
                            update('stat-total-visits', formatNumber(s.totalVisits));
                            update('stat-today-visits', s.todayVisits);
                            update('stat-total-views', formatNumber(s.totalViews));
                            update('aside-posts', s.totalPosts);
                            update('aside-comments', s.totalComments);
                            var upEl = document.getElementById('stat-uptime');
                            if (upEl && s.blogCreatedAt) {
                                var days2 = Math.floor((new Date() - new Date(s.blogCreatedAt)) / 86400000);
                                upEl.textContent = days2 + ' \u5929';
                            }
                        } catch(e) {}
                    }
                };
                r.send();
            }, 30000);
        }

        // Calendar
        var postDays = postsAll.map(function(p){ return new Date(p.created_at).getDate(); });
        renderCalendar(postDays);

        // Charts
        initArticleOverviewChart();
        loadChartData();

        // Article List - 全部显示
        loadArticleList('all');
    }

    /* ========== Article List Loader ========== */
    function loadArticleList(filter, page) {
        var currentFilter = filter || 'all';
        var currentPage = page || 1;
        var PAGE_SIZE = 7;
        var xhr = new XMLHttpRequest();
        var url = '/api/posts?limit=100' + (currentFilter !== 'all' ? '&category=' + encodeURIComponent(currentFilter) : '');
        xhr.open('GET', url, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                try {
                    var posts = JSON.parse(xhr.responseText);
                    var pinnedPosts = posts.filter(function(p){ return p.is_pinned; });
                    var normalPosts = posts.filter(function(p){ return !p.is_pinned; });

                    // Render pinned
                    var pinnedEl = document.getElementById('pinned-articles');
                    if (pinnedEl) {
                        if (pinnedPosts.length > 0) {
                            pinnedEl.innerHTML = pinnedPosts.map(function(a, i) {
                                return buildCardHTML(a, true, i * 0.08);
                            }).join('');
                        } else {
                            pinnedEl.innerHTML = '<p class="text-gray-400 text-sm">\u6682\u65e0\u7f6e\u9876\u6587\u7ae0</p>';
                        }
                    }

                    // Render list - 全部时不分页
                    var isAll = currentFilter === 'all';
                    var totalPages = isAll ? 1 : Math.max(1, Math.ceil(normalPosts.length / PAGE_SIZE));
                    if (currentPage > totalPages) currentPage = 1;
                    var start = (currentPage - 1) * PAGE_SIZE;
                    var pageArticles = isAll ? normalPosts : normalPosts.slice(start, start + PAGE_SIZE);

                    var listEl = document.getElementById('article-list');
                    if (listEl) {
                        if (pageArticles.length === 0) {
                            listEl.innerHTML = '<p class="text-center text-gray-400 py-12">\u6682\u65e0\u6587\u7ae0</p>';
                        } else {
                            listEl.innerHTML = pageArticles.map(function(a, i) {
                                return buildCardHTML(a, false, i * 0.08);
                            }).join('');
                        }
                    }

                    // Update filter buttons
                    document.querySelectorAll('.filter-btn').forEach(function(btn) {
                        var f = btn.getAttribute('data-filter') || btn.getAttribute('onclick').match(/filterArticles\('([^']+)'\)/)?.[1];
                        if (f === currentFilter) {
                            btn.className = btn.className.replace(/bg-\w+-\d+\s+dark:bg-\w+-\S+\s+text-\w+-\d+\s+dark:text-\w+\S+/, '').trim() + ' bg-purple-100 dark:bg-purple-900/40 text-purple-600 dark:text-purple-300';
                        } else {
                            btn.className = btn.className.replace(/bg-purple-100\s+dark:bg-purple-900\/40\s+text-purple-600\s+dark:text-purple-300/, 'bg-gray-100 dark:bg-slate-700 text-gray-500 dark:text-gray-400');
                        }
                    });

                    // Pagination
                    renderPageNav(normalPosts.length, totalPages, currentPage, currentFilter);

                } catch(e) {
                    console.error('[loadArticleList]', e);
                    var listEl = document.getElementById('article-list');
                    if (listEl) listEl.innerHTML = '<p class="text-center text-red-400 py-12">\u52a0\u8f7d\u5931\u8d25</p>';
                }
            }
        };
        xhr.send();
    }

    function buildCardHTML(article, pinned, delay) {
        var tags = (article.tags || []).slice(0, 3);
        var tagsHtml = tags.map(function(t){ return '<span class="px-2 py-0.5 rounded-full text-xs bg-purple-50 dark:bg-purple-900/30 text-purple-600 dark:text-purple-300">' + esc(t) + '</span>'; }).join('');
        var cover = article.cover_image ? '<img src="' + esc(article.cover_image) + '" alt="' + esc(article.title) + '" class="w-full h-40 object-cover rounded-xl mb-4">' : '';
        var pinnedBadge = pinned ? '<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-orange-100 dark:bg-orange-900/30 text-orange-600 dark:text-orange-300"><i class="fas fa-thumbtack mr-1"></i>\u7f6e\u9876</span>' : '';
        var catBadge = article.category_name ? '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-300">' + esc(article.category_name) + '</span>' : '';
        var dateStr = article.created_at ? new Date(article.created_at).toLocaleString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit'}) : '-';
        return '<article class="article-card bg-white dark:bg-slate-800 rounded-2xl p-6 border border-gray-200 dark:border-gray-700 hover:border-purple-300 dark:hover:border-purple-600 transition-all hover:shadow-md animate-fadeInUp" style="animation-delay:' + delay + 's">' +
            cover +
            '<div class="flex items-center gap-2 mb-3">' + pinnedBadge + catBadge + '</div>' +
            '<h2 class="text-lg md:text-xl font-bold text-gray-800 dark:text-gray-100 mb-2 hover:text-purple-600 dark:hover:text-purple-300 transition-colors cursor-pointer"><a href="/post/' + article.slug + '">' + esc(article.title) + '</a></h2>' +
            '<p class="text-sm text-gray-500 dark:text-gray-400 mb-4 line-clamp-2 leading-relaxed">' + esc(article.excerpt) + '</p>' +
            '<div class="flex items-center justify-between text-xs text-gray-400">' +
            '<div class="flex items-center gap-4"><span><i class="far fa-calendar mr-1"></i>' + dateStr + '</span><span><i class="far fa-eye mr-1"></i>' + (article.view_count||0) + '</span></div>' +
            '<div class="flex gap-1">' + tagsHtml + '</div></div></article>';
    }

    function renderPageNav(total, totalPages, currentPage, currentFilter) {
        var pgEl = document.getElementById('pagination');
        if (!pgEl || totalPages <= 1) { if (pgEl) pgEl.innerHTML = ''; return; }
        var html = '<button onclick="changePage(' + (currentPage - 1) + ',\'' + currentFilter + '\')" class="page-btn' + (currentPage <= 1 ? ' opacity-40 cursor-not-allowed' : '') + '"><i class="fas fa-chevron-left"></i></button>';
        var range = getPageRange(currentPage, totalPages);
        range.forEach(function(p) {
            if (p === '...') { html += '<span class="px-2 text-gray-400">\u2026</span>'; }
            else { html += '<button onclick="changePage(' + p + ',\'' + currentFilter + '\')" class="page-btn' + (p === currentPage ? ' active' : '') + '">' + p + '</button>'; }
        });
        html += '<button onclick="changePage(' + (currentPage + 1) + ',\'' + currentFilter + '\')" class="page-btn' + (currentPage >= totalPages ? ' opacity-40 cursor-not-allowed' : '') + '"><i class="fas fa-chevron-right"></i></button>';
        pgEl.innerHTML = html;
    }

    function getPageRange(current, total) {
        if (total <= 7) return Array.from({length:total},function(_,i){ return i+1; });
        if (current <= 4) return [1,2,3,4,5,'...',total];
        if (current >= total - 3) return [1,'...',total-4,total-3,total-2,total-1,total];
        return [1,'...',current-1,current,current+1,'...',total];
    }

    function filterArticles(filter) {
        loadArticleList(filter, 1);
    }

    function changePage(page, filter) {
        loadArticleList(filter || 'all', page);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function handleSearch(e) {
        e.preventDefault();
        var q = (document.getElementById('search-input') || {}).value || '';
        if (!q.trim()) return;
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/posts?search=' + encodeURIComponent(q), true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                try {
                    var posts = JSON.parse(xhr.responseText);
                    var resultEl = document.getElementById('search-results');
                    if (!resultEl) return;
                    if (posts.length === 0) {
                        resultEl.innerHTML = '<div class="text-center py-8 text-gray-400">\u672a\u627e\u5230\u76f8\u5173\u6587\u7ae0</div>';
                    } else {
                        resultEl.innerHTML = posts.slice(0, 10).map(function(p, i) {
                            var highlighted = p.title.replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'), '<mark>$1</mark>');
                            return '<a href="/post/' + p.slug + '" class="flex items-start gap-3 p-4 rounded-xl hover:bg-purple-50 dark:hover:bg-purple-900/10 transition-colors group"><span class="flex-shrink-0 w-7 h-7 rounded-full bg-purple-100 dark:bg-purple-900 flex items-center justify-center text-xs font-bold text-purple-600 dark:text-purple-300">' + (i+1) + '</span><div><div class="font-semibold text-gray-800 dark:text-gray-100 group-hover:text-purple-600 transition-colors">' + highlighted + '</div><div class="text-sm text-gray-400 mt-1 line-clamp-1">' + esc(p.excerpt||'') + '</div><div class="text-xs text-gray-300 mt-1">' + (p.created_at ? new Date(p.created_at).toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'}) : '') + ' \u00b7 ' + (p.view_count||0) + ' \u9605\u8BFB</div></div></a>';
                        }).join('');
                    }
                    resultEl.classList.remove('hidden');
                } catch(e) {}
            }
        };
        xhr.send();
    }

    /* ========== Theme ========== */
    function updateThemeIcon() {
        var isDark = document.documentElement.classList.contains('dark');
        document.querySelectorAll('.theme-toggle-icon').forEach(function(el) {
            el.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });
    }

    function toggleTheme() {
        var isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        updateThemeIcon();
    }

    /* ========== Mobile Menu ========== */
    var mobileBtn = document.getElementById('mobile-menu-btn');
    var mobileMenu = document.getElementById('mobile-menu');
    if (mobileBtn && mobileMenu) {
        mobileBtn.addEventListener('click', function() { mobileMenu.classList.toggle('hidden'); });
    }

    /* ========== Back to Top ========== */
    var backBtn = document.getElementById('back-to-top');
    if (backBtn) {
        window.addEventListener('scroll', function() {
            backBtn.style.opacity = window.scrollY > 300 ? '1' : '0';
            backBtn.style.pointerEvents = window.scrollY > 300 ? 'auto' : 'none';
        }, { passive: true });
        backBtn.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });
    }

    /* ========== Music Player ========== */
    var musicBtn = document.getElementById('music-play-btn');
    var musicBars = document.getElementById('music-bars');
    var musicPlaying = false;
    if (musicBtn && musicBars) {
        musicBtn.addEventListener('click', function() {
            musicPlaying = !musicPlaying;
            musicBtn.innerHTML = musicPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play text-sm ml-0.5"></i>';
            if (musicBars) musicBars.classList.toggle('music-paused', !musicPlaying);
        });
    }

    /* ========== Theme init ========== */
    var savedTheme = localStorage.getItem('theme');
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (savedTheme ? savedTheme === 'dark' : prefersDark) {
        document.documentElement.classList.add('dark');
    }
    updateThemeIcon();

    /* ========== Theme toggle buttons ========== */
    document.querySelectorAll('.theme-toggle-btn').forEach(function(btn) {
        btn.addEventListener('click', toggleTheme);
    });

    /* ========== Search close on outside click ========== */
    document.addEventListener('click', function(e) {
        if (!e.target.closest('#search-form') && !e.target.closest('#search-results')) {
            var sr = document.getElementById('search-results');
            if (sr) sr.classList.add('hidden');
        }
        if (!e.target.closest('#mobile-menu-btn') && !e.target.closest('#mobile-menu')) {
            var mm = document.getElementById('mobile-menu');
            if (mm) mm.classList.add('hidden');
        }
    });

    /* ========== Keyboard shortcuts ========== */
    document.addEventListener('keydown', function(e) {
        if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
            e.preventDefault();
            var si = document.getElementById('search-input');
            if (si) si.focus();
        }
        if (e.key === 'Escape') {
            var si = document.getElementById('search-input');
            if (si) si.blur();
            var sr = document.getElementById('search-results');
            if (sr) sr.classList.add('hidden');
        }
    });

    /* ========== Start ========== */
    initIndex();
})();
  </script>
